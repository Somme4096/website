uot;^Flogseq____&quot;,202,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Xlogseq____&quot;,23,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Vlogseq____&quot;,23,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Ulogseq____&quot;,23,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Ulogseq____&quot;,200,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Ulogseq____&quot;,201,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Hlogseq____&quot;,200,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^Hlogseq____&quot;,201,536870926]],[logseq____&quot;^15logseq____&quot;,[203,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u68ab2bdc-9bd4-44bc-95e1-16660e1f5f50logseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;リャプノフのコンチェルト、と私は心の中で繰り返した。それは、つい数分前まで私が座っていた旅客機の機内オーディオで流れていた曲のタイトルだった。だが、今、私は旅客機の中にはいない。\\n\\n私は空中にいた。文字通り、何も存在しない、底なしの真っ黒い虚空の中に。\\n\\n数分前まで搭乗していた機体は跡形もなく消え去った。何の前兆も、警告もなく、ただ突然に。革座席の背もたれの感触も、隣の乗客のわずかな体温も、油圧システムのほのかな作動音も、すべてが一瞬のうちに消え失せた。まるで世界が私以外のすべてを、実存そのものから切り離したかのように。\\n\\n初めは、今の状況が信じられなかった。これは夢か、それとも一種の幻覚か。しかし、頬を撫でる冷たい気圧の流れと、肺が空気を求めて不合理なほどに収縮する感覚が、それが紛れもない現実であることを突きつけた。私は落下しているのだろうか？だが、落下しているという感覚はなかった。私はただ、その場に“存在”しているのみだった。上下も、左右も、意味がなかった。私の凍え張りつめられた五感だけが空間を支えていた。\\n\\n凍えるような寒さから逃れるため、意識を無理やり集中させると、奇妙なことに、微かな音楽が聞こえてきた。それは、リャプノフのコンチェルトの一節、静かで平和なピアノの調べだった。どうやら耳元のすぐそばで奏でられているらしい。しかし、音源はどこにも見当たらない。それは私の認知の内側から響いているのか、それともこの広大な空そのものが奏でる、私だけに聞こえる不協和音なのか。\\n\\nしばらくたって、私は自身が空中でゆっくりと回転していることに気づいた。しかし、それは私の自由意志によるものではない。見えない巨大な手が私を操っているらしい。何とか振り切ろうとしていると、視界の端に、かつて数分前に機体があったであろう場所に、微かな、しかし確かに輝く光の点が現れた。まるで遠い星のようであったが、私に近づいてきているのは確実だった。光の点は次第に大きくなり、その輪郭がはっきりとしてくる。それは、飛行機の窓だった。私の座っていた真横の、あの窓。\\n\\n窓は、空中に宙づりになっていた。まるで、そこだけが切り取られた空間であるかのように。その中には、見慣れた機内の光景が広がっていた。座席、通路、頭上の荷物入れ。そして、私の隣に座っていた乗客が、何事もなかったかのように、小綺麗なタブレットで電子書籍を読んでいる。私はその窓に向かって手を伸ばした。触れることができる、そう確信した。\\n\\nしかし、私の手は窓をすり抜けた。すり抜けたというより、私の手と窓はまるでお互いを映す鏡のように、干渉もせず、姿形も変化せず、そのまま窓の向こうの虚無を手のひら一杯につかんだ。窓の中の乗客は、相変わらず無表情で本を読んでいる。彼は、私がそこにいることに気づいていないーあるいは、彼にとって私は最初から存在していなかったのかもしれない。そしてそれは彼にとっても、私にとっても、もはや重要なことではないのだろう。\\n\\nリャプノフのコンチェルトの旋律が、より一層鮮明になった。今度は、オーケストラの壮大な響きも加わり、まるで私を取り巻く空気が、その音色に合わせて振動しているかのようだった。私は再び窓に触れようと試みたが、やはり手は空を切った。回転がゆっくりと止まり始めた。激しい旋律はやがて沈静化し、再び静かなピアノのソロパートに戻った。\\n\\n窓の向こうの光景が、ゆっくりと遠ざかっていく。そして、私の意識もまた、その光景と共に遠のいていくような感覚に襲われた。私は自分が、この無限の空のどこかに、リャプノフのコンチェルトの最後の音が消えるまで、ただ浮遊し続けることを何となく理解した。空中で無為に手足をじたばたさせた私の姿は、まさに情熱的な指揮者そのものであっただろう。地上の観客のためにアンコールをしようとも考えたが、指揮棒が必要だということに気が付き、代わりに使えるものはないかと周りを見回した。\\n\\nすると、先ほどは姿が見えなかった巨大な手がついに正体を現し、わたしを親指、中指と人差し指ではさみ、旋律に合わせて軽快に振り回しているのがわかった。私は恐怖と奇妙な高揚感に襲われたが、その一瞬の感情もまた、再び盛り上がったリャプノフのコンチェルトにかき消されたのであった。logseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^1:logseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^Flogseq____&quot;,203,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^Xlogseq____&quot;,23,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^Vlogseq____&quot;,23,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^Ulogseq____&quot;,23,536870926]],[logseq____&quot;^15logseq____&quot;,[204,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u68ab2bdc-bf82-4659-80f8-b0ad7021962clogseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;孔乙己是站着喝酒而穿長衫的唯一的人。他身材很高大；靑白臉色，皺紋間時常夾些傷痕；一部亂蓬蓬的花白的鬍子。穿的雖然是長衫，可是又髒又破，似乎十多年沒有補，也沒有洗。他對人說話，總是滿口之乎者也，教人半懂不懂的。因爲他姓孔，別人便從描紅紙上的『上大人孔乙己』這半懂不懂的話裏，替他取下一個綽號，叫作孔乙己。孔乙己一到店，所有喝酒的人便都看着他笑，有的叫道：『孔乙己，你臉上又添上新傷疤了！』他不回答，對櫃裏說：『溫兩碗酒，要一碟茴香豆。』便排出九文大錢。他們又故意的高聲嚷道：『你一定又偸了人家的東西了！』孔乙己睜大眼睛說：『你怎麽這樣憑空汚人淸白……』『什麽淸白？我前天親眼見你偸了何家的書，弔着打。』孔乙己便漲紅了臉，額上的靑筋條條綻出，爭辯道：『竊書不能算偸……竊書！……讀書人的事，能算偸麽？』接連便是難懂的話，什麽『君子固窮』，什麽『者乎』之類，引得衆人都鬨笑起來；店內外充滿了快活的空氣。logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^1:logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Flogseq____&quot;,218,536870927]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Xlogseq____&quot;,21,536870927]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Vlogseq____&quot;,218,536870927]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^Ulogseq____&quot;,21,536870927]],[logseq____&quot;^15logseq____&quot;,[206,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u68ab2bdc-e38e-43fd-8122-aed2d45c79aflogseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;我從十二歲起，便在鎭口的咸亨酒店裏當夥計，掌櫃說，樣子太儍，怕侍候不了長衫主顧，就在外面做點事罷。外面的短衣主顧，雖然容易說話，但嘮嘮叨叨纏夾不淸的也很不少。他們往往要親眼看着黃酒從罎子裏舀出，看過壺子底裏有水沒有，又親看將壺子放在熱水裏，然後放心：在這嚴重監督之下，羼水也很爲難。所以過了幾天，掌櫃又說我幹不了這事。幸虧薦頭的情面大，辭退不得，便改爲專管溫酒的一種無聊職務了。logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^1:logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^Flogseq____&quot;,215,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^Xlogseq____&quot;,21,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^Vlogseq____&quot;,215,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^Ulogseq____&quot;,21,536870927]],[logseq____&quot;^15logseq____&quot;,[207,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u68ab2bdc-42e3-4dbd-9e01-bee0ac73488elogseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[208,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;魯鎭的酒店的格局，是和別處不同的：都是當街一個曲尺形的大櫃臺，櫃裏面豫備着熱水，可以隨時溫酒。做工的人，傍午傍晚散了工，每每花四文銅錢，買一碗酒——這是二十多年前的事，現在每碗要漲到十文，——靠櫃外站着，熱熱的喝了休息；倘肯多花一文，便可以買一碟鹽煑筍，或者茴香豆，做下酒物了，如果出到了十幾文，那就能買一樣葷菜，但這些顧客，多是短衣幫，大抵沒有這樣闊綽。只有穿長衫的，纔踱進店面隔壁的房子裏，要酒要菜，慢慢地坐喝。logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[208,logseq____&quot;^Ologseq____&quot;,logseq____& 長寿な花で、伝説によれば世界が終わった後も生き続ける」\\n\\nなるほど、と私は妙に納得した。通りで花瓶も花も古臭く見えたものだ。\\n\\n私は手を伸ばし、その冷たい陶器の表面に触れた。ひんやりとした感触はあったものの、同時に微かな振動が指先に伝わってくる。\\n\\nその瞬間、赤い花が一枚の花びらをそっと落とした。その花びらは宙をゆっくりと漂い、最終的には私の足元に静かに着地した。私はかがんでそれをつまみ上げた。驚いたことに、その花びらはまるで薄い金属のように硬く、しかし恐ろしいほど軽かった。微細な東洋の文字が刻まれているように見える。だが、あまりにも小さすぎて、私の目では読み取ることができない。\\n\\n目を凝らして花びらを見ていると、縁が微妙に広がり、その内側からかすかな囁きが聞こえてきた。言語的な発声というよりも、風が枝を揺らす音、あるいは遠のく川のせせらぎのような、無意味ながらも意味を帯びた響きだった。\\n\\n私はもう一度、花瓶全体を見上げた。今度は、その青い模様の中に、これまで気づかなかった奇妙な形が浮かび上がっているのに気づいた。それは人間の顔のようでもあり、動物のようでもあり、同時にどちらでもない。形容しがたい何かの輪郭。そしてその形は、私が目を凝らすほどに、私を見つめ返しているかのように鮮明になっていった。\\n\\n私は花瓶から目を離せなくなった。それは単なる置物ではなく、生きている何か、あるいは生き続けている何かだと確信したのだ。花瓶はその奇妙な紋様を変え続け、ついにはある名状しがたい「誰か」の顔が浮かんだ。\\n\\n花瓶の表面に浮かび上がった顔は、私が見つめるほどに歪み、水面に映る光学的な像が水波で崩れるように、その形を不定に変え始めた。目があった瞬間、それは歪な口を開き、私自身の声で私の名前を呼んだ。そして、また形を変え、こういった。\\n\\n*「お前は誰だ？」*\\n\\nその問いは私の頭の中で響き渡った。しかしその声は私の知っている私の声よりも遥かに古く、疲れていた。花瓶の模様はさらに理解不能になり、無限に続く迷宮のように絡み合い、変化し、無数の記憶の影を赤砂岩でできたタイルに落とした。\\n\\n私は花瓶に引き寄せられるように、一歩、また一歩と近づいた。青花瓷の表面は、今や冷たくはなく、熱を帯びているように感じられた。花に触れようと手を伸ばしたその瞬間、永生花の口から無数の赤い花びらが噴水のように噴き出した。それらは宙を舞い、私の周りを旋回し、ノウスフィアの薄いベールを突き破り、クオリアの隙間から入り込んできた。それらの花びらを振り払おうとしたが、それらはまるで私の一部であるように私を通り抜け、またたく間に私のすべてを吞み込んだ。\\n\\n気がつくと、私はまだ花瓶の前に立っていた。しかし、私が立っていたのはもはやイスタンブールの旅館の正面ではなかった。そこは無限に広がる赤い花びらで覆われた空間だった。空は深い貝紫色に染まり、遠くにはいくつもの巨大な花びらが太古の巨人のようにそびえ立っていた。そして、私の足元には、先ほど私が手にしていたのと同じ一枚の赤い花びらが横たわっていた。\\n\\n花びらの表面には、私の人生の全ての記憶、私が経験したこと、私が夢見たこと、全てが極めて微細な文字として刻まれていた。私はその花びらの上に立ち尽くし、自分が、あるいは自分が世界と呼んでいたものの実存は、いつの間にかこの花瓶の中へと完全に吸収されてしまったことを、もはや無意味となった思考を通じて理解した。\\n\\nああ、と私は思わず呟いた。\\n\\n永生花とは、私自身のことだったのだ。logseq____&quot;,536870930]],[logseq____&quot;^15logseq____&quot;,[239,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^1:logseq____&quot;,536870930]],[logseq____&quot;^15logseq____&quot;,[239,logseq____&quot;^Flogseq____&quot;,238,536870930]],[logseq____&quot;^15logseq____&quot;,[239,logseq____&quot;^Xlogseq____&quot;,29,536870930]],[logseq____&quot;^15logseq____&quot;,[239,logseq____&quot;^Vlogseq____&quot;,29,536870930]],[logseq____&quot;^15logseq____&quo
